name: Native build on Windows

on:
  push:
    # windows-port-clean: lets the Windows CI run on the port branch on a fork
    # (the fork's master has no windows.yml yet). Drop before upstreaming.
    branches: [ master, windows-port-clean ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  merge_group:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

# The Windows port is built against a PINNED toolchain that matches the Linux CI
# (GCC 13.3, Boost 1.83), reproduced from scratch the first time and then served
# from the caches below. See WINDOWS.md for the rationale.
#
#   - winlibs MinGW-w64 GCC 13.3.0 (UCRT, posix, seh)  -> cached in C:\winlibs13
#   - Conan builds ICU/OpenSSL/zstd/zlib/bzip2 from source -> cached in CONAN_HOME
#   - Boost 1.83 built from source with the b2 archive fix -> cached in BOOST_INSTALL
#
# A cold cache pays the full ~60 min build once; warm runs restore the prebuilt
# dependencies and only compile QLever + run the tests.
env:
  # Pinned winlibs GCC 13.3.0 release (UCRT runtime, posix threads, SEH EH).
  WINLIBS_VERSION: "13.3.0posix-11.0.1-ucrt-r1"
  WINLIBS_URL: "https://github.com/brechtsanders/winlibs_mingw/releases/download/13.3.0posix-11.0.1-ucrt-r1/winlibs-x86_64-posix-seh-gcc-13.3.0-mingw-w64ucrt-11.0.1-r1.zip"
  WINLIBS_DIR: "C:\\winlibs13"
  BOOST_VERSION: "1.83.0"
  BOOST_INSTALL: "C:\\boost-1.83"
  # Pin the Conan home so the cache path is stable.
  CONAN_HOME: "C:\\conan2"
  # jemalloc — QLever's default allocator (Linux links it too). Built static with
  # C++ support so its unprefixed operator new/delete serve QLever's C++ heap.
  JEMALLOC_VERSION: "5.3.0"
  JEMALLOC_INSTALL: "C:\\jemalloc"

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        build-type: [Release]

    steps:
      # QLever's test data contains binary files; CRLF translation corrupts them,
      # so disable autocrlf BEFORE the checkout clones the repo.
      - name: Disable CRLF translation
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      # --- winlibs GCC 13.3 (cached) -------------------------------------------
      # restore/save are split (not the combined actions/cache) so each cache is
      # written the moment its artifact is built — surviving a later step's failure
      # or a cancelled run, instead of only at the post-job step at the very end.
      - name: Cache winlibs GCC (restore)
        id: cache-winlibs
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.WINLIBS_DIR }}
          key: winlibs-${{ env.WINLIBS_VERSION }}

      - name: Download winlibs GCC
        if: steps.cache-winlibs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          curl.exe -sL -o winlibs.zip "$env:WINLIBS_URL"
          Expand-Archive -Path winlibs.zip -DestinationPath "$env:WINLIBS_DIR" -Force

      - name: Cache winlibs GCC (save)
        if: steps.cache-winlibs.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.WINLIBS_DIR }}
          key: winlibs-${{ env.WINLIBS_VERSION }}

      - name: Put winlibs (gcc, cmake, ninja) on PATH
        shell: pwsh
        run: |
          "$env:WINLIBS_DIR\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Print compiler version
        shell: bash
        run: g++ --version && cmake --version && ninja --version

      # --- MSYS2 tools needed by the autotools-based Conan deps (OpenSSL, ICU)
      # and the jemalloc build (gawk, for its private-symbol generation) --------
      # windows-2022 ships MSYS2 at C:\msys64; make sure make/perl/autotools/gawk exist.
      - name: Install MSYS2 build tools (make, perl, autoconf, gawk)
        shell: pwsh
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm --needed make perl autoconf automake libtool tar gawk

      # --- jemalloc (cached): QLever's default allocator. Built BEFORE Conan/Boost
      # because it depends only on winlibs + MSYS2 — so iterating on jemalloc never
      # invalidates or rebuilds the expensive Conan/Boost caches. ---------------
      - name: Cache jemalloc (restore)
        id: cache-jemalloc
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.JEMALLOC_INSTALL }}
          key: jemalloc-${{ env.JEMALLOC_VERSION }}-windows-gcc13-v2

      - name: Build jemalloc from source
        if: steps.cache-jemalloc.outputs.cache-hit != 'true'
        # MSYS2 bash, NOT the default Git bash: jemalloc's Makefile uses $(SHELL)
        # unquoted, and Git's sh lives under "C:/Program Files/Git/..." — the space
        # splits the command ("C:/Program: No such file or directory", Error 127).
        # MSYS2's sh is at C:\msys64 (no space), like the Conan autotools deps use.
        shell: 'C:\msys64\usr\bin\bash.exe -eo pipefail {0}'
        run: |
          set -e
          # winlibs gcc/nm + the MSYS2 toolset (sh/make/gawk/tar) on PATH.
          export PATH="/c/winlibs13/mingw64/bin:/usr/bin:/bin:/c/Windows/System32:$PATH"
          # On MinGW (pecoff) jemalloc's C API is je_-prefixed by design, so plain
          # malloc/free stay on the UCRT heap, but its C++ operator new/delete are
          # exported UNPREFIXED, so linking the static archive routes all of QLever's
          # C++ allocations through jemalloc (see CMakeLists QLEVER-MINGW-JEMALLOC).
          # --enable-cxx is the default. jemalloc's pecoff build names the static lib
          # jemalloc_s.lib, but QLever's find_library expects libjemalloc.a, so we
          # install it under that name.
          curl.exe -sL -o jemalloc.tar.bz2 "https://github.com/jemalloc/jemalloc/releases/download/${JEMALLOC_VERSION}/jemalloc-${JEMALLOC_VERSION}.tar.bz2"
          tar xjf jemalloc.tar.bz2
          cd "jemalloc-${JEMALLOC_VERSION}"
          # Force the native mingw triplet: under MSYS2 bash config.guess reports
          # x86_64-pc-msys, which jemalloc rejects ("Unsupported operating system")
          # and which drags in a broken pthread path (pthread_create undeclared).
          # --host/--build pin native mingw (pecoff) so the je_-prefixed C API and
          # the unprefixed C++ operators get built. CC=gcc keeps winlibs' gcc.
          ./configure --build=x86_64-w64-mingw32 --host=x86_64-w64-mingw32 \
            CC=gcc CXX=g++ --disable-shared --enable-static
          make -j4 build_lib_static
          JDST="${JEMALLOC_INSTALL//\\//}"
          mkdir -p "$JDST/lib" "$JDST/include"
          A=$(find lib \( -name 'jemalloc_s.lib' -o -name 'libjemalloc.a' \) | head -1)
          cp "$A" "$JDST/lib/libjemalloc.a"
          strip --strip-debug "$JDST/lib/libjemalloc.a" || true
          cp -r include/jemalloc "$JDST/include/"
          # Fail loudly if the C++ override isn't present (LLP64: operator new == _Znwy).
          nm "$JDST/lib/libjemalloc.a" | grep -q ' T _Znwy' \
            || { echo "ERROR: jemalloc built without C++ operators"; exit 1; }

      - name: Cache jemalloc (save)
        if: steps.cache-jemalloc.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.JEMALLOC_INSTALL }}
          key: jemalloc-${{ env.JEMALLOC_VERSION }}-windows-gcc13-v2

      # --- Conan dependencies (ICU/OpenSSL/zstd/zlib/bzip2, cached) -------------
      - name: Install Conan
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "conan>=2.0"
          conan --version

      - name: Cache Conan packages (restore)
        id: cache-conan
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: conan-windows-gcc13-${{ hashFiles('conanprofiles/gcc-13-windows', 'conanprofiles/conanfile-windows-deps.txt') }}

      - name: Conan install (dependencies except Boost)
        shell: bash
        run: |
          conan install conanprofiles/conanfile-windows-deps.txt \
            -pr:a conanprofiles/gcc-13-windows \
            --output-folder=build --build=missing

      - name: Cache Conan packages (save)
        if: steps.cache-conan.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: conan-windows-gcc13-${{ hashFiles('conanprofiles/gcc-13-windows', 'conanprofiles/conanfile-windows-deps.txt') }}

      # --- Boost 1.83 from source with the b2 archive fix (cached) -------------
      - name: Cache Boost install (restore)
        id: cache-boost
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.BOOST_INSTALL }}
          key: boost-${{ env.BOOST_VERSION }}-windows-gcc13-v2

      - name: Build Boost from source
        if: steps.cache-boost.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -e
          # Boost.Iostreams only compiles its zlib/bzip2 backends if b2 finds those
          # libraries at build time. The windows-2022 runner happens to have an
          # ambient zlib so it auto-detects one, but that is fragile and may not be
          # the zlib the rest of QLever links; on a clean toolchain it finds none
          # and silently builds Iostreams WITHOUT zlib, so linking qlever-server
          # later fails with "undefined reference to boost::iostreams::detail::
          # zlib_base::*". Point b2 explicitly at the pinned Conan zlib/bzip2 (same
          # packages spatialjoin uses) so the backends are always built. The lib
          # dir is the include's sibling; the static libs are libz.a / libbz2.a.
          ZINC=$(grep -rhoiE 'C:/[^";]*zlib[^";]*/include' build | head -1)
          BINC=$(grep -rhoiE 'C:/[^";]*bzip2[^";]*/include' build | head -1)
          ZLIB_LIB="${ZINC%/include}/lib"; BZ2_LIB="${BINC%/include}/lib"
          BV_US=${BOOST_VERSION//./_}
          curl.exe -sL -o boost.tar.gz "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BV_US}.tar.gz"
          tar xzf boost.tar.gz
          cd "boost_${BV_US}"
          # MinGW b2 archive fix: the static-library archive action writes object
          # paths into the `ar` response file with native backslashes, which GNU
          # `ar` treats as escapes and strips. Make it use forward-slash, target-
          # relative paths like b2's own link actions already do ($(>) -> $(>:T)).
          sed -i 's/:E="$(>)"/:E="$(>:T)"/' tools/build/src/tools/gcc.jam
          ./bootstrap.bat gcc
          # Only the compiled Boost libraries QLever links; stacktrace excluded.
          ./b2 toolset=gcc address-model=64 variant=release link=static \
            threading=multi runtime-link=shared \
            --with-url --with-iostreams --with-program_options --with-container \
            -sZLIB_INCLUDE="$ZINC" -sZLIB_LIBPATH="$ZLIB_LIB" -sZLIB_BINARY=z \
            -sBZIP2_INCLUDE="$BINC" -sBZIP2_LIBPATH="$BZ2_LIB" -sBZIP2_BINARY=bz2 \
            --prefix="${BOOST_INSTALL}" -j2 install

      - name: Cache Boost install (save)
        if: steps.cache-boost.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.BOOST_INSTALL }}
          key: boost-${{ env.BOOST_VERSION }}-windows-gcc13-v2

      # Fail loudly (fresh OR cached Boost) if Boost.Iostreams was built WITHOUT
      # the zlib backend — b2 silently omits it when it can't find zlib, and the
      # only later symptom is an opaque link error ("undefined reference to
      # boost::iostreams::detail::zlib_base::*") when qlever-server links.
      - name: Verify Boost.Iostreams has the zlib backend
        shell: bash
        run: |
          IOS_LIB=$(ls "${BOOST_INSTALL//\\//}"/lib/libboost_iostreams*.a | head -1)
          if [ -z "$IOS_LIB" ] || ! nm "$IOS_LIB" | grep -q 'zlib_base'; then
            echo "ERROR: Boost.Iostreams (${IOS_LIB:-not found}) has no zlib backend."
            echo "b2 silently built it without zlib; qlever-server would fail to link."
            exit 1
          fi
          echo "OK: Boost.Iostreams contains the zlib backend ($IOS_LIB)."

      # --- spatialjoin needs zlib/bzip2 headers; the jemalloc test needs its header
      - name: Export include paths (zlib/bzip2 for spatialjoin, jemalloc for the test)
        shell: bash
        run: |
          ZINC=$(grep -rhoiE 'C:/[^";]*zlib[^";]*/include' build | head -1)
          BINC=$(grep -rhoiE 'C:/[^";]*bzip2[^";]*/include' build | head -1)
          JINC="${JEMALLOC_INSTALL//\\//}/include"
          echo "Using zlib include:     $ZINC"
          echo "Using bzip2 include:    $BINC"
          echo "Using jemalloc include: $JINC"
          echo "CPLUS_INCLUDE_PATH=${ZINC};${BINC};${JINC}" >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=${ZINC};${BINC}" >> $GITHUB_ENV

      # --- Configure / build / test (one static + jemalloc build) ---------------
      # jemalloc is found via CMAKE_PREFIX_PATH, so the jemalloc block links it and
      # makes the whole build fully static (see CMakeLists QLEVER-MINGW-JEMALLOC) —
      # which is also exactly the binary we ship. SINGLE_TEST_BINARY=ON links all
      # unit tests into one executable: static test exes are large, and one binary
      # keeps the runner's disk in check. _NO_TIMING_TESTS=ON: the sleep-precision
      # timing tests are flaky on the shared-CPU runner (~15.6 ms tick), as on macOS.
      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_TOOLCHAIN_FILE="$(pwd)/build/conan_toolchain.cmake" \
            -DCMAKE_PREFIX_PATH="${BOOST_INSTALL//\\//};${JEMALLOC_INSTALL//\\//}" \
            -DSINGLE_TEST_BINARY=ON \
            -D_NO_TIMING_TESTS=ON

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.build-type }} -- -j 4

      - name: Test
        working-directory: build/test
        shell: bash
        run: env CTEST_OUTPUT_ON_FAILURE=1 ctest -C ${{ matrix.build-type }} -j 4 .

      # --- Distributable artifact -----------------------------------------------
      # The binaries are already fully static (jemalloc forces -static), so just
      # collect + verify them. They are byte-for-byte the code the suite just ran,
      # and need no MinGW DLLs at the target site (only the Windows system DLLs on
      # Windows 10+/Server 2016+).
      - name: Collect + verify self-contained binaries
        shell: bash
        run: |
          mkdir -p dist
          cp build/qlever-server.exe build/qlever-index.exe dist/
          if objdump -p dist/qlever-server.exe | grep -i 'DLL Name' \
               | grep -iE 'libgcc|libstdc|libwinpthread|libgomp'; then
            echo "ERROR: binary still depends on a MinGW runtime DLL"; exit 1
          fi
          echo "qlever-server.exe / qlever-index.exe are self-contained."

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: qlever-windows-x64-static
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # End-to-end tests, run against the SHIPPED self-contained binary.
  #
  # A dedicated job (not a step in `build`) so it exercises exactly the static
  # artifact users download: it pulls qlever-index/-server from the build job and
  # needs no compiler — only a Python with PyICU + PyYAML to drive e2e/queryit.py.
  # The catch is PyICU (queryit.py uses icu.Collator): pip has no Windows wheel for
  # the runner's Python, but MSYS2 ships a prebuilt mingw package, and e2e.sh runs
  # under bash anyway. So we use the MSYS2 mingw Python via setup-msys2 and point
  # e2e.sh at it with PYTHON_BINARY. The harness then builds the scientist index
  # INCLUDING the text index, serves it, and runs the same query battery as the
  # Linux e2e — covering the text-index path that the unit tests don't reach.
  e2e:
    name: End-to-end tests (static binary)
    needs: build
    runs-on: windows-2022
    steps:
      # The scientist-collection test data is binary; keep CRLF off (as in build).
      - name: Disable CRLF translation
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v6

      - name: Download the self-contained binaries
        uses: actions/download-artifact@v4
        with:
          name: qlever-windows-x64-static
          path: e2e-bin

      # MSYS2 mingw Python is the one path that ships a prebuilt PyICU; setup-msys2
      # manages a fresh pacman db + keyring and the MINGW64 shell (which puts
      # /mingw64/bin on PATH so that Python finds its ICU/yaml DLLs).
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-yaml
            mingw-w64-x86_64-python-icu
            unzip
            curl

      - name: Run end-to-end tests
        shell: 'msys2 {0}'
        run: |
          chmod +x e2e-bin/*.exe || true
          /mingw64/bin/python -c "import icu, yaml; print('PyICU', icu.ICU_VERSION, '/ PyYAML', yaml.__version__)"
          PYTHON_BINARY=/mingw64/bin/python ./e2e/e2e.sh -d e2e-bin
