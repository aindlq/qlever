name: Native build on Windows

on:
  push:
    # windows-port-clean: lets the Windows CI run on the port branch on a fork
    # (the fork's master has no windows.yml yet). Drop before upstreaming.
    branches: [ master, windows-port-clean ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  merge_group:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

# The Windows port is built against a PINNED toolchain that matches the Linux CI
# (GCC 13.3), reproduced from scratch the first time and then served from the
# caches below. See WINDOWS.md for the rationale.
#
#   - winlibs MinGW-w64 GCC 13.3.0 (UCRT, posix, seh)  -> cached in C:\winlibs13
#   - Conan builds ICU/OpenSSL/zstd/zlib/bzip2/Boost/jemalloc from source
#     -> cached in CONAN_HOME
#
# A cold cache pays the full ~60 min build once; warm runs restore the prebuilt
# dependencies and only compile QLever + run the tests.
env:
  # Pinned winlibs GCC 13.3.0 release (UCRT runtime, posix threads, SEH EH).
  WINLIBS_VERSION: "13.3.0posix-11.0.1-ucrt-r1"
  WINLIBS_URL: "https://github.com/brechtsanders/winlibs_mingw/releases/download/13.3.0posix-11.0.1-ucrt-r1/winlibs-x86_64-posix-seh-gcc-13.3.0-mingw-w64ucrt-11.0.1-r1.zip"
  WINLIBS_DIR: "C:\\winlibs13"
  # Pin the Conan home so the cache path is stable.
  CONAN_HOME: "C:\\conan2"

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        build-type: [Release]

    steps:
      # QLever's test data contains binary files; CRLF translation corrupts them,
      # so disable autocrlf BEFORE the checkout clones the repo.
      - name: Disable CRLF translation
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      # --- winlibs GCC 13.3 (cached) -------------------------------------------
      # restore/save are split (not the combined actions/cache) so each cache is
      # written the moment its artifact is built — surviving a later step's failure
      # or a cancelled run, instead of only at the post-job step at the very end.
      - name: Cache winlibs GCC (restore)
        id: cache-winlibs
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.WINLIBS_DIR }}
          key: winlibs-${{ env.WINLIBS_VERSION }}

      - name: Download winlibs GCC
        if: steps.cache-winlibs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          curl.exe -sL -o winlibs.zip "$env:WINLIBS_URL"
          Expand-Archive -Path winlibs.zip -DestinationPath "$env:WINLIBS_DIR" -Force

      - name: Cache winlibs GCC (save)
        if: steps.cache-winlibs.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.WINLIBS_DIR }}
          key: winlibs-${{ env.WINLIBS_VERSION }}

      - name: Put winlibs (gcc, cmake, ninja) on PATH
        shell: pwsh
        run: |
          "$env:WINLIBS_DIR\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Print compiler version
        shell: bash
        run: g++ --version && cmake --version && ninja --version

      # --- MSYS2 tools needed by the autotools-based Conan deps (OpenSSL, ICU,
      # jemalloc): make/perl/autoconf, plus gawk for jemalloc's symbol generation.
      # windows-2022 ships MSYS2 at C:\msys64; make sure make/perl/autotools/gawk exist.
      - name: Install MSYS2 build tools (make, perl, autoconf, gawk)
        shell: pwsh
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm --needed make perl autoconf automake libtool tar gawk

      # --- Conan dependencies (ICU/OpenSSL/zstd/zlib/bzip2/Boost/jemalloc, cached) -------------
      - name: Install Conan
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "conan>=2.0"
          conan --version

      - name: Cache Conan packages (restore)
        id: cache-conan
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: conan-windows-gcc13-${{ hashFiles('conanprofiles/gcc-13-windows', 'conanprofiles/conanfile-windows-deps.txt') }}

      - name: Conan install (all dependencies)
        shell: bash
        run: |
          conan install conanprofiles/conanfile-windows-deps.txt \
            -pr:a conanprofiles/gcc-13-windows \
            --output-folder=build --build=missing

      - name: Cache Conan packages (save)
        if: steps.cache-conan.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: conan-windows-gcc13-${{ hashFiles('conanprofiles/gcc-13-windows', 'conanprofiles/conanfile-windows-deps.txt') }}

      # --- spatialjoin needs zlib/bzip2 headers via CPLUS_INCLUDE_PATH ----------
      - name: Export include paths (zlib/bzip2 for spatialjoin)
        shell: bash
        run: |
          ZINC=$(grep -rhoiE 'C:/[^";]*zlib[^";]*/include' build | head -1)
          BINC=$(grep -rhoiE 'C:/[^";]*bzip2[^";]*/include' build | head -1)
          echo "Using zlib include:     $ZINC"
          echo "Using bzip2 include:    $BINC"
          echo "CPLUS_INCLUDE_PATH=${ZINC};${BINC}" >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=${ZINC};${BINC}" >> $GITHUB_ENV

      # --- Configure / build / test (one static + jemalloc build) ---------------
      # jemalloc is found via the Conan toolchain file, so the jemalloc block links
      # it and makes the whole build fully static (see CMakeLists QLEVER-MINGW-JEMALLOC) —
      # which is also exactly the binary we ship. SINGLE_TEST_BINARY=ON links all
      # unit tests into one executable: static test exes are large, and one binary
      # keeps the runner's disk in check. _NO_TIMING_TESTS=ON: the sleep-precision
      # timing tests are flaky on the shared-CPU runner (~15.6 ms tick), as on macOS.
      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DCMAKE_TOOLCHAIN_FILE="$(pwd)/build/conan_toolchain.cmake" \
            -DSINGLE_TEST_BINARY=ON \
            -D_NO_TIMING_TESTS=ON

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.build-type }} -- -j 4

      - name: Test
        working-directory: build/test
        shell: bash
        run: env CTEST_OUTPUT_ON_FAILURE=1 ctest -C ${{ matrix.build-type }} -j 4 .

      # --- Distributable artifact -----------------------------------------------
      # The binaries are already fully static (jemalloc forces -static), so just
      # collect + verify them. They are byte-for-byte the code the suite just ran,
      # and need no MinGW DLLs at the target site (only the Windows system DLLs on
      # Windows 10+/Server 2016+).
      - name: Collect + verify self-contained binaries
        shell: bash
        run: |
          mkdir -p dist
          cp build/qlever-server.exe build/qlever-index.exe dist/
          if objdump -p dist/qlever-server.exe | grep -i 'DLL Name' \
               | grep -iE 'libgcc|libstdc|libwinpthread|libgomp'; then
            echo "ERROR: binary still depends on a MinGW runtime DLL"; exit 1
          fi
          echo "qlever-server.exe / qlever-index.exe are self-contained."

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: qlever-windows-x64-static
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # End-to-end tests, run against the SHIPPED self-contained binary.
  #
  # A dedicated job (not a step in `build`) so it exercises exactly the static
  # artifact users download: it pulls qlever-index/-server from the build job and
  # needs no compiler — only a Python with PyICU + PyYAML to drive e2e/queryit.py.
  # The catch is PyICU (queryit.py uses icu.Collator): pip has no Windows wheel for
  # the runner's Python, but MSYS2 ships a prebuilt mingw package, and e2e.sh runs
  # under bash anyway. So we use the MSYS2 mingw Python via setup-msys2 and point
  # e2e.sh at it with PYTHON_BINARY. The harness then builds the scientist index
  # INCLUDING the text index, serves it, and runs the same query battery as the
  # Linux e2e — covering the text-index path that the unit tests don't reach.
  e2e:
    name: End-to-end tests (static binary)
    needs: build
    runs-on: windows-2022
    steps:
      # The scientist-collection test data is binary; keep CRLF off (as in build).
      - name: Disable CRLF translation
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v6

      - name: Download the self-contained binaries
        uses: actions/download-artifact@v4
        with:
          name: qlever-windows-x64-static
          path: e2e-bin

      # MSYS2 mingw Python is the one path that ships a prebuilt PyICU; setup-msys2
      # manages a fresh pacman db + keyring and the MINGW64 shell (which puts
      # /mingw64/bin on PATH so that Python finds its ICU/yaml DLLs).
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-yaml
            mingw-w64-x86_64-python-icu
            unzip
            curl

      - name: Run end-to-end tests
        shell: 'msys2 {0}'
        run: |
          chmod +x e2e-bin/*.exe || true
          /mingw64/bin/python -c "import icu, yaml; print('PyICU', icu.ICU_VERSION, '/ PyYAML', yaml.__version__)"
          PYTHON_BINARY=/mingw64/bin/python ./e2e/e2e.sh -d e2e-bin
